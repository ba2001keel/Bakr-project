<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}مستشار في إدارة الأعمال والمحاسبة{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'portfolio/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">المستشار</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">نبذة عني</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'services' %}">الخدمات</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'portfolio' %}">الأعمال</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'skills' %}">المهارات</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">تواصل معي</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2024 مستشار في إدارة الأعمال والمحاسبة</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
